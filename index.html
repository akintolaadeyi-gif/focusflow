<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusFlow • Todo + Time</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>FocusFlow</h1>
      <p class="subtitle">Tasks + Time Tracker</p>
    </header>

    <form id="todo-form" class="add-form">
      <input 
        type="text" 
        id="todo-input" 
        placeholder="What needs to be done?" 
        autocomplete="off"
        required
      >
      
      <select id="time-estimate" class="time-select">
        <option value="15">15 min</option>
        <option value="25" selected>25 min</option>
        <option value="45">45 min</option>
        <option value="60">60 min</option>
      </select>
      
      <button type="submit" class="add-btn">Add Task</button>
    </form>

    <div class="tasks-container">
      <ul id="todo-list" class="todo-list"></ul>
    </div>

    <footer class="todo-footer">
      <span id="task-count">0 tasks left</span>
      
      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>

      <button id="clear-completed" class="clear-btn">Clear Completed</button>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
